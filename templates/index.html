<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry AI - Quantum</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="chat-wrapper">
        <header>
            <div class="header-left">
                <div class="status-online"></div>
                <h1>Geometry AI</h1>
            </div>
            
            <div class="reasoning-panel">
                <span class="reasoning-label">Raciocínio</span>
                <label class="switch">
                    <input type="checkbox" id="reasoning-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </header>

        <div id="chat-container">
            <div class="message bot">Olá! Eu sou a Geometry AI. Como posso ajudar?</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Pergunte algo...">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
